<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>Offline | Relocation by Numbers</title>
    <style>
      :root { color-scheme: light dark; font-family: Arial, Helvetica, sans-serif; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; background: #f8fafc; color: #0f172a; }
      main { width: min(100%, 560px); padding: 32px; border: 1px solid #e2e8f0; border-radius: 24px; background: #fff; box-shadow: 0 18px 50px rgba(15,23,42,.10); text-align: center; }
      img { width: 180px; max-width: 100%; height: auto; }
      h1 { margin: 28px 0 12px; font-size: clamp(1.75rem, 7vw, 2.25rem); }
      p { margin: 0; color: #475569; line-height: 1.65; }
      button { margin-top: 24px; min-height: 44px; border: 0; border-radius: 12px; padding: 11px 18px; background: #0f172a; color: #fff; font: inherit; font-weight: 700; cursor: pointer; }
      @media (prefers-color-scheme: dark) {
        body { background: #020617; color: #f8fafc; }
        main { border-color: #1e293b; background: #0f172a; }
        p { color: #cbd5e1; }
        button { background: #2ecc71; color: #052e20; }
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/logo.svg" alt="Relocation by Numbers" />
      <h1>You’re offline</h1>
      <p>Reconnect to use the latest calculator formulas and relocation data. Your financial inputs have not been saved offline.</p>
      <button type="button" onclick="location.reload()">Try again</button>
    </main>
  </body>
</html>
